<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ajglobe — ivea7h every cell</title>
<style>
  html,body{margin:0;height:100%;background:#ffffff;overflow:hidden;
    font:13px ui-monospace,Menlo,monospace;color:#9aa7b4;}
  #c{position:absolute;inset:0;width:100%;height:100%;display:block;cursor:grab;touch-action:none;}
  #c:active{cursor:grabbing;}
  #hud{position:absolute;top:14px;left:16px;z-index:10;background:#0b0e13cc;
    border:1px solid #2a323d;border-radius:8px;padding:10px 13px;line-height:1.7;}
  #hud b{color:#e6edf3;}
  button{background:#1c232d;color:#9aa7b4;border:1px solid #2a323d;border-radius:6px;
    padding:3px 9px;cursor:pointer;font:inherit;margin-right:4px;}
  button.on{background:#58a6ff;color:#06121f;border-color:transparent;}
  #status{display:block;margin-top:7px;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="pin" style="position:absolute;z-index:5;pointer-events:none;display:none">
  <!-- (left,top) is the projected point; the DOT is centered on it, the LABEL is offset so it never displaces the dot -->
  <span style="position:absolute;left:0;top:0;transform:translate(-50%,-50%);width:8px;height:8px;border-radius:50%;background:#58a6ff;box-shadow:0 0 0 2px #06121f"></span>
  <span style="position:absolute;left:9px;top:-7px;white-space:nowrap;color:#11151c;text-shadow:0 1px 2px #fff,0 0 3px #fff">London</span>
</div>
<div id="hud">
  <b>ajglobe</b> · ivea7h every cell
  <span style="margin-left:6px">
    <button id="r1">r1</button><button id="r2">r2</button><button id="r3">r3</button><button id="r5" class="on">r5</button><button id="r6">r6</button>
  </span>
  <span style="margin-left:6px">
    <button id="np">north pole</button><button id="am">antimeridian</button>
    <button id="recolor">recolor</button><button id="fade">fade</button><button id="coast">coastlines</button><button id="save">save PNG</button>
  </span>
  <span id="status">loading…</span>
  <span id="cursor" style="display:block;margin-top:4px;color:#7d8b99">move over the globe…</span>
</div>

<script type="module">
import { Orb } from '../src/orb.js';

// viridis via 8 control stops (no d3 dependency)
const STOPS = [[68,1,84],[71,44,122],[59,81,139],[44,113,142],
               [33,144,141],[39,173,129],[92,200,99],[253,231,37]];
function viridis(t){
  t = Math.max(0, Math.min(1, t)) * (STOPS.length - 1);
  const i = Math.min(STOPS.length - 2, t | 0), f = t - i, a = STOPS[i], b = STOPS[i+1];
  return [a[0]+(b[0]-a[0])*f, a[1]+(b[1]-a[1])*f, a[2]+(b[2]-a[2])*f, 255];
}
function bisect(arr, x){ let lo=0, hi=arr.length; while(lo<hi){const m=(lo+hi)>>1; if(arr[m]<x)lo=m+1; else hi=m;} return lo; }

const orb = new Orb(document.getElementById('c'), { background:'#ffffff', sphere:'#e0e6ed' });
window.orb = orb;   // handy for the console / benchmarking
orb.lookAt(180, 25);

const cache = new Map();
async function bin(name, Ctor){ const b = await fetch(`data/${name}`).then(r=>{if(!r.ok)throw new Error(name+' '+r.status);return r.arrayBuffer();}); return new Ctor(b); }

let layer = null, cur = null, flip = false, alpha = 255;
// Color a feature by its aspect-ratio percentile (viridis); `flip` reverses the
// ramp (recolor) and `alpha` is the per-feature opacity (fade) — both applied via
// layer.update() with no re-tessellation.
function paint(i){
  const a = cur.ar[i];
  if(!Number.isFinite(a)) return [68, 68, 68, alpha];
  const t = bisect(cur.sorted, a) / (cur.sorted.length - 1);
  const c = viridis(flip ? 1 - t : t);
  c[3] = alpha;
  return c;
}
async function show(res){
  document.getElementById('status').textContent = `loading r${res}…`;
  if(!cache.has(res)){
    const [pos, starts, ar] = await Promise.all([
      bin(`ivea7h_r${res}_pos.f32`, Float32Array),
      bin(`ivea7h_r${res}_idx.u32`, Uint32Array),
      bin(`ivea7h_r${res}_ar.f32`, Float32Array),
    ]);
    const sorted = Float64Array.from([...ar].filter(Number.isFinite)).sort();
    cache.set(res, { pos, starts, ar, sorted });
  }
  cur = cache.get(res); flip = false;
  const t0 = performance.now();
  if(layer) layer.remove();
  layer = orb.polygons({ lnglat: cur.pos, starts: cur.starts, fill: paint });
  const buildMs = Math.round(performance.now() - t0);
  const s = orb.stats;
  document.getElementById('status').innerHTML =
    `<b>${s.cells.toLocaleString()}</b> cells · <b>${s.verts.toLocaleString()}</b> verts · `
    + `built in <b>${buildMs} ms</b> · drag to rotate · scroll to zoom`;
}

for(const r of [1,2,3,5,6]) document.getElementById('r'+r).onclick = (e)=>{
  document.querySelectorAll('#r1,#r2,#r3,#r5,#r6').forEach(b=>b.classList.toggle('on', b===e.target));
  show(r);
};
// Per-feature opacity: fade toggles cell alpha and restyles in place (no re-tessellation).
document.getElementById('fade').onclick = (e)=>{
  if(!layer) return;
  alpha = alpha === 255 ? 110 : 255;
  e.target.classList.toggle('on', alpha !== 255);
  layer.update({ fill: paint });
};
document.getElementById('np').onclick = ()=>orb.lookAt(0,90);
document.getElementById('am').onclick = ()=>orb.lookAt(180,0);
// Coastlines (Natural Earth 110m) as a thin GL_LINES overlay — toggle on/off.
let coast = null, coastData = null;
document.getElementById('coast').onclick = async (e)=>{
  if(coast){ coast.remove(); coast = null; e.target.classList.remove('on'); return; }
  if(!coastData){
    const [pos, starts] = await Promise.all([
      bin('ne_110m_coast_pos.f32', Float32Array),
      bin('ne_110m_coast_idx.u32', Uint32Array),
    ]);
    coastData = { pos, starts };
  }
  coast = orb.lines({ lnglat: coastData.pos, starts: coastData.starts, color: '#000000', width: 2 });
  e.target.classList.add('on');
};

// Composition surface demo: a DOM pin positioned by project() (hidden on the
// back hemisphere), and a cursor lng/lat readout fed by the hover event.
const pinEl = document.getElementById('pin'), PIN = { lng: -0.13, lat: 51.5 };
function placePin(){
  const p = orb.project(PIN.lng, PIN.lat);
  pinEl.style.display = p.visible ? 'block' : 'none';
  pinEl.style.left = p.x + 'px'; pinEl.style.top = p.y + 'px';
}
orb.on('viewchange', placePin);
// Static export: render the current view to a high-res PNG and download it.
document.getElementById('save').onclick = async ()=>{
  const blob = await orb.snapshot({ width: 2000 });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ajglobe.png';
  a.click();
  URL.revokeObjectURL(a.href);
};
const cursorEl = document.getElementById('cursor');
orb.on('hover', e => {
  orb.highlight(e.index);                          // light up the cell under the cursor (M4 picking)
  cursorEl.textContent = (e.lng == null ? 'off globe'
    : `${e.lat >= 0 ? 'N' : 'S'} ${Math.abs(e.lat).toFixed(2)}°  ${e.lng >= 0 ? 'E' : 'W'} ${Math.abs(e.lng).toFixed(2)}°`)
    + (e.index != null ? `  ·  cell #${e.index.toLocaleString()}` : '');
});
placePin();
// Restyle in place — rewrites the per-feature style texture only, no re-tessellation.
document.getElementById('recolor').onclick = ()=>{
  if(!layer) return;
  flip = !flip;
  const t0 = performance.now();
  layer.update({ fill: paint });
  const ms = (performance.now() - t0).toFixed(1);
  document.getElementById('status').innerHTML =
    `restyled <b>${cur.ar.length.toLocaleString()}</b> features in <b>${ms} ms</b> `
    + `· no re-tessellation (layer.update)`;
};
show(5);
</script>
</body>
</html>
